name: renovate-config-validator
description: renovate-config-validator
author: Shunsuke Suzuki
inputs:
  ref:
    description: "checkout ref"
    required: false
  validator_version:
    description: "version of renovate-config-validator. By default, the latest version is used."
    required: false
  config_file_path:
    description: |
      Renovate Configuration file
      By default, the following files are validated.

      - .github/renovate.json
      - .github/renovate.json5
      - .gitlab/renovate.json
      - .gitlab/renovate.json5
      - .renovaterc.json
      - renovate.json
      - renovate.json5
      - .renovaterc
    required: false
  node-version:
    required: false
    description: Node version
    default: "24"
  strict:
    required: false
    default: "true"
    description: renovate-config-validator strict mode
runs:
  using: composite
  steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      if: inputs.config_file_path == ''
      with:
        ref: ${{inputs.ref}}
        persist-credentials: false
        sparse-checkout: |
          .github
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      if: inputs.config_file_path != ''
      with:
        ref: ${{inputs.ref}}
        persist-credentials: false
        sparse-checkout: ${{inputs.config_file_path}}
        sparse-checkout-cone-mode: false
    - uses: suzuki-shunsuke/github-action-renovate-config-validator@ee9f69e1f683ed0d08225086482b34fc9abe9300 # v2.1.0
      with:
        validator_version: ${{inputs.validator_version}}
        config_file_path: ${{inputs.config_file_path}}
        strict: ${{inputs.strict}}
        node-version: ${{inputs.node-version}}
